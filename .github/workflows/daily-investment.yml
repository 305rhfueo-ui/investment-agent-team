name: Daily Price Update

# 매일 미국장 마감 후 자동으로 "보유 종목 가격만 갱신"(경량, LLM 없음, 노트북 불필요).
# 실무진 스크리닝·검증단·신규 추천은 실행하지 않음 → 그것들은 사용자가 'start investment heavy/light' 할 때만.
# cron 은 UTC 기준. '0 23 * * 1-5' = 평일 23:00 UTC = 한국시간 08:00.

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 보유 종목 가격 갱신 (LLM 없음)
        run: node scripts/update-prices.js

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "investment-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 스킵"
          else
            git commit -m "chore(daily): 보유 종목 가격 자동 갱신"
            git push
          fi
