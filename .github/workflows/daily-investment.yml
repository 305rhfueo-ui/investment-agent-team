name: Daily Investment Run

# 매일 미국장 마감 후 자동 실행 (노트북 불필요). 수동 실행 버튼(workflow_dispatch)도 제공.
# cron 은 UTC 기준. '0 23 * * 1-5' = 평일 23:00 UTC = 한국시간 08:00.
# 필요하면 시간을 조정하세요. GitHub Actions 스케줄은 부하에 따라 몇 분 지연될 수 있습니다.

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 투자 파이프라인 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NO_OPEN: '1'   # CI 에서는 브라우저 오픈 안 함
          NO_GIT: '1'    # 커밋은 아래 단계에서 직접 처리
        run: node scripts/start-investment.js

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "investment-bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 사항 없음 - 커밋 스킵"
          else
            git commit -m "chore(daily): 자동 투자 실행 결과"
            git push
          fi
