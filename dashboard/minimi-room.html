<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🏠 투자팀 미니룸</title>
<!-- 실행 데이터: start-investment 가 생성. 없으면 데모 아이들 상태로 표시 -->
<script src="data/latest-run.js" onerror="window.__NO_DATA=true"></script>
<script src="data/history.js" onerror="window.__NO_HISTORY=true"></script>
<script src="data/reports.js" onerror="window.__NO_REPORTS=true"></script>
<script src="data/verification.js" onerror="window.__NO_VERIFY=true"></script>
<script src="data/qna.js" onerror="window.__NO_QNA=true"></script>
<script src="data/real-accounts.js" onerror="window.__NO_REAL=true"></script>
<script src="data/briefing.js" onerror="window.__NO_BRIEFING=true"></script>
<script src="data/watchlist.js" onerror="window.__NO_WATCH=true"></script>
<style>
  :root{
    --bg1:#ffe8f0; --bg2:#e7f0ff; --floor:#f6d9b8; --floor2:#eac59a;
    --wall:#fbeaf2; --panel:rgba(255,255,255,.82); --ink:#3a2f4a; --sub:#8a7f9a;
    --card:#ffffff; --line:rgba(120,90,150,.18); --accent:#ff7aa8; --good:#22b07d; --bad:#e5484d;
    --shadow:0 8px 26px rgba(150,110,160,.22);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg1:#241b3a; --bg2:#181a34; --floor:#3a3350; --floor2:#2e2842;
      --wall:#2a2142; --panel:rgba(38,30,58,.82); --ink:#f0e9ff; --sub:#a99fc4;
      --card:#2c2446; --line:rgba(180,150,220,.18); --accent:#ff8fb8; --good:#3ddc97; --bad:#ff6b70;
      --shadow:0 8px 26px rgba(0,0,0,.4);}
  }
  :root[data-theme="light"]{ --bg1:#ffe8f0; --bg2:#e7f0ff; --floor:#f6d9b8; --floor2:#eac59a; --wall:#fbeaf2; --panel:rgba(255,255,255,.82); --ink:#3a2f4a; --sub:#8a7f9a; --card:#fff; --line:rgba(120,90,150,.18); --good:#22b07d; --bad:#e5484d; }
  :root[data-theme="dark"]{ --bg1:#241b3a; --bg2:#181a34; --floor:#3a3350; --floor2:#2e2842; --wall:#2a2142; --panel:rgba(38,30,58,.82); --ink:#f0e9ff; --sub:#a99fc4; --card:#2c2446; --line:rgba(180,150,220,.18); --good:#3ddc97; --bad:#ff6b70; }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Malgun Gothic","Apple SD Gothic Neo",-apple-system,system-ui,sans-serif;
    color:var(--ink); background:linear-gradient(160deg,var(--bg1),var(--bg2)); min-height:100%;
    display:flex; flex-direction:column;
  }
  /* ── 상단 HUD ── */
  .hud{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .brand{font-weight:800;font-size:18px;margin-right:6px;display:flex;align-items:center;gap:8px}
  .brand .logo{font-size:22px}
  .stat{display:flex;flex-direction:column;padding:4px 12px;border-radius:12px;background:var(--card);
    box-shadow:var(--shadow);min-width:96px}
  .stat b{font-size:16px;line-height:1.2}
  .stat span{font-size:11px;color:var(--sub)}
  .pos{color:var(--good)} .neg{color:var(--bad)}
  .light{margin-left:auto;display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
  .dot{width:14px;height:14px;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.25)}
  .theme-btn{border:none;background:var(--card);color:var(--ink);border-radius:10px;padding:6px 10px;cursor:pointer;box-shadow:var(--shadow);font-size:13px}

  /* ── 본문: 룸 + 로그 ── */
  .main{flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:0;min-height:0}
  @media(max-width:820px){.main{grid-template-columns:1fr}}

  .room{position:relative;overflow:hidden;display:flex}
  /* 4-room 그리드 (실무진·리서치·검증단·임원실 동시 표시) */
  .room.rooms4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;padding:8px}
  .rcell{position:relative;border-radius:14px;overflow:hidden;min-height:0;box-shadow:0 8px 22px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.05)}
  .rhead{position:absolute;top:7px;left:8px;z-index:6;font-size:10.5px;font-weight:800;padding:3px 10px;border-radius:11px;
    background:rgba(24,16,8,.5);color:#ffe6c2;backdrop-filter:blur(5px);letter-spacing:.2px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .rhead small{font-weight:600;font-size:9px}
  .scene.mini{position:absolute;inset:0}
  .scene.mini .stage{bottom:7%;gap:min(2vw,18px);padding:0 8px;z-index:2}
  .scene.mini .char{width:clamp(34px,4.2vw,58px)}
  .scene.mini .nametag{font-size:8.5px;padding:2px 7px;margin-top:3px}
  .scene.mini .nametag small{display:none}
  .scene.mini .bubble{max-width:130px;font-size:10px}
  .minichart{position:absolute;top:30px;left:8px;right:8px;height:32%;background:linear-gradient(165deg,#161a26,#0b0d14);
    border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,.4),inset 0 0 0 1px rgba(120,150,200,.14);padding:6px;overflow:hidden;z-index:1}
  .deskrow{position:absolute;left:7%;right:7%;bottom:4.5%;height:16px;border-radius:7px 7px 4px 4px;
    background:linear-gradient(180deg,#8a6640,#5f4327);box-shadow:0 6px 14px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.12);z-index:3}
  /* 뒷벽 */
  .wall{position:absolute;inset:0 0 34% 0;background:
    repeating-linear-gradient(90deg, rgba(60,40,20,.10) 0 1.5px, transparent 1.5px 74px),
    radial-gradient(130% 90% at 50% -8%, rgba(255,240,220,.14), transparent 55%),
    linear-gradient(180deg,#caa27b,#b98a5f);
    box-shadow:inset 0 -26px 46px rgba(50,30,12,.20)}
  :root[data-theme="dark"] .wall{background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.24) 0 1.5px, transparent 1.5px 74px),
    radial-gradient(130% 90% at 50% -8%, rgba(255,220,180,.08), transparent 55%),
    linear-gradient(180deg,#4b3927,#38291a);
    box-shadow:inset 0 -26px 46px rgba(0,0,0,.38)}
  /* 바닥 (따뜻한 원목) */
  .floor{position:absolute;left:0;right:0;bottom:0;height:36%;
    background:linear-gradient(180deg,#8a6a44,#6d5133);
    box-shadow:inset 0 8px 20px rgba(0,0,0,.22)}
  :root[data-theme="dark"] .floor{background:linear-gradient(180deg,#2f2418,#20180f)}
  .floor::before{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.10) 0 2px,transparent 2px 68px);}
  /* 차트 월 */
  .chartwall{position:absolute;top:6%;left:50%;transform:translateX(-50%);
    width:min(58%,520px);height:38%;background:linear-gradient(165deg,#161a26,#0b0d14);border-radius:14px;
    box-shadow:0 14px 34px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06),inset 0 0 0 1px rgba(120,150,200,.14);
    padding:8px;overflow:hidden}
  .chartwall .cap{position:absolute;top:7px;left:13px;font-size:11px;color:#8493b5;font-weight:700;letter-spacing:.4px}
  .plant{position:absolute;bottom:34%;font-size:34px;filter:drop-shadow(0 4px 3px rgba(0,0,0,.15))}

  /* 캐릭터 스테이션 */
  .stage{position:absolute;left:0;right:0;bottom:4%;display:flex;justify-content:center;
    align-items:flex-end;gap:min(3.4vw,42px);padding:0 12px}
  .char{position:relative;width:clamp(52px,8vw,84px);cursor:pointer;display:flex;flex-direction:column;align-items:center;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);filter:saturate(.96)}
  .char .svgwrap{width:100%;animation:idle 2.8s ease-in-out infinite}
  .char.active{transform:translateY(-16px) scale(1.08);z-index:5}
  .char.active .svgwrap{animation:talk .5s ease-in-out infinite}
  .char.dim{opacity:.55;filter:grayscale(.25) saturate(.8)}
  .desk{width:62%;height:9px;border-radius:50%;background:rgba(0,0,0,.16);margin-top:-2px;filter:blur(1.5px)}
  .nametag{margin-top:5px;font-size:10.5px;font-weight:800;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.94);color:#3a2f4a;box-shadow:0 2px 7px rgba(40,25,10,.28);white-space:nowrap;border:1px solid rgba(120,90,60,.16)}
  :root[data-theme="dark"] .nametag{background:rgba(46,38,60,.95);color:#f0e9ff;border-color:rgba(180,150,220,.2)}
  .nametag small{color:var(--sub);font-weight:600}
  @keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes talk{0%,100%{transform:translateY(-6px) rotate(-1.5deg)}50%{transform:translateY(0) rotate(1.5deg)}}

  /* 방 전환 */
  .roomswitch{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:15;display:flex;gap:4px;background:var(--panel);padding:4px;border-radius:14px;box-shadow:var(--shadow)}
  .rmbtn{border:none;background:transparent;color:var(--sub);font-weight:800;font-size:12.5px;padding:6px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .rmbtn.on{background:var(--accent);color:#fff}
  .execbadge{position:absolute;top:12px;right:12px;z-index:16;font-size:11.5px;font-weight:800;padding:5px 10px;border-radius:12px;background:linear-gradient(135deg,#5a4a2a,#9a7b3a);color:#ffe9b0;box-shadow:var(--shadow);cursor:pointer;white-space:nowrap}
  .wall-r{background:linear-gradient(180deg,#2a2440,#221c36)}
  .scene{position:relative;flex:1 1 0;min-width:0;overflow:hidden}
  .scene[hidden]{display:none}
  .scene + .scene{border-left:2px solid var(--line)}
  /* 좌우 반반(둘 다) 모드에서 캐릭터 축소 */
  .room.split .char{width:clamp(42px,5.6vw,74px)}
  .room.split .stage{gap:min(1.4vw,14px);padding:0 6px}
  .room.split .nametag{font-size:9px;padding:1px 5px}
  .room.split .nametag small{display:none}
  .room.split .bubble{max-width:150px;font-size:11px}
  .room.split .vboard{width:88%;font-size:11px}
  .room.split .chartwall{width:86%}
  /* 검증단 방 */
  /* 검증단·리서치 방도 원목 통일 (조명 색만 살짝 다르게) */
  .wall-v, .wall-r{background:
    repeating-linear-gradient(90deg, rgba(60,40,20,.10) 0 1.5px, transparent 1.5px 74px),
    radial-gradient(130% 90% at 50% -8%, rgba(190,205,255,.12), transparent 55%),
    linear-gradient(180deg,#caa27b,#b98a5f);
    box-shadow:inset 0 -26px 46px rgba(50,30,12,.20)}
  :root[data-theme="dark"] .wall-v, :root[data-theme="dark"] .wall-r{background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.24) 0 1.5px, transparent 1.5px 74px),
    radial-gradient(130% 90% at 50% -8%, rgba(150,175,255,.08), transparent 55%),
    linear-gradient(180deg,#4b3927,#38291a);
    box-shadow:inset 0 -26px 46px rgba(0,0,0,.38)}
  .floor-v{background:linear-gradient(#413a63,#332d50)}
  :root[data-theme="light"] .floor-v{background:linear-gradient(#d7cff0,#c7bde8)}
  .vboard{position:absolute;top:6%;left:50%;transform:translateX(-50%);width:min(72%,600px);max-height:44%;overflow:auto;background:var(--card);border-radius:16px;box-shadow:var(--shadow);border:3px solid rgba(180,160,240,.35);padding:12px 14px}
  .vboard .cap{font-size:12px;color:var(--sub);font-weight:800}
  .vboard .cap small{font-weight:600}
  .vverdict{margin-top:8px;font-size:12px;line-height:1.5}
  .vverdict .vhead{font-weight:800;font-size:13px;margin-bottom:4px}
  .vverdict table{width:100%;border-collapse:collapse;margin:6px 0;font-size:11.5px}
  .vverdict th,.vverdict td{border:1px solid var(--line);padding:3px 6px;text-align:center}
  .vverdict .veto{color:var(--bad);font-weight:800}
  .vverdict .ok{color:var(--good);font-weight:800}
  .vbadge{display:inline-block;padding:2px 8px;border-radius:10px;font-weight:800;font-size:11px}

  /* 말풍선 */
  .bubble{position:absolute;bottom:112%;left:50%;transform:translateX(-50%) scale(.6);
    background:var(--card);color:var(--ink);border-radius:14px;padding:9px 12px;font-size:13px;line-height:1.35;
    width:max-content;max-width:230px;box-shadow:var(--shadow);border:1px solid var(--line);
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);font-weight:600}
  .bubble.show{opacity:1;transform:translateX(-50%) scale(1)}
  .bubble::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:8px solid transparent;border-top-color:var(--card)}

  /* 오른쪽 로그 */
  .side{background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .side h3{margin:0;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .log{flex:1;overflow:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .msg{display:flex;gap:8px;align-items:flex-start;animation:pop .3s ease}
  .msg .who{font-weight:800;font-size:11px;padding:2px 7px;border-radius:8px;color:#fff;white-space:nowrap;flex-shrink:0}
  .msg .txt{font-size:12.5px;line-height:1.4}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .recos{border-top:1px solid var(--line);padding:10px 12px;max-height:34%;overflow:auto}
  .recos .r{font-size:12px;padding:6px 8px;border-radius:10px;background:var(--card);margin-bottom:6px;box-shadow:var(--shadow)}
  .recos .r b{color:var(--accent)}

  /* 하단 컨트롤 */
  .ctrl{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line)}
  .phases{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--sub);flex-wrap:wrap}
  .ph{padding:3px 10px;border-radius:20px;background:var(--card);transition:.3s}
  .ph.on{background:var(--accent);color:#fff;font-weight:800}
  .btn{border:none;border-radius:10px;padding:7px 14px;cursor:pointer;font-weight:800;font-size:13px;background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .btn.sec{background:var(--card);color:var(--ink)}
  .spacer{flex:1}
  .banner{background:var(--card);color:var(--sub);font-size:12px;padding:6px 14px;text-align:center;border-top:1px solid var(--line)}

  /* 탭 */
  .tabs{display:flex;gap:2px;padding:8px 6px 0;border-bottom:1px solid var(--line);overflow-x:auto}
  .tab{border:none;background:transparent;color:var(--sub);font-weight:800;font-size:11.5px;padding:7px 7px;border-radius:10px 10px 0 0;cursor:pointer;white-space:nowrap;flex:0 0 auto}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  .tabview{flex:1;overflow:auto;min-height:0}
  .tabview[hidden]{display:none}
  /* 일자별 */
  .day{border-bottom:1px solid var(--line);padding:10px 12px}
  .day-h{font-weight:800;font-size:12.5px;margin-bottom:6px;display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap}
  .day-h .ret{font-weight:800}
  .day-sec{font-size:11px;color:var(--sub);font-weight:800;margin:6px 0 3px}
  .trade{font-size:12px;padding:5px 8px;border-radius:9px;background:var(--card);margin-bottom:4px;box-shadow:var(--shadow)}
  .trade .why{color:var(--sub);font-size:11px}
  .trade .rp{font-weight:800}
  .trade .lesson{display:block;margin-top:3px;color:var(--bad);font-size:11px;line-height:1.35}
  .trade .note{display:block;margin-top:3px;color:var(--good);font-size:11px;line-height:1.35}
  .empty{color:var(--sub);font-size:12px;padding:16px;text-align:center}
  /* 추천·분석 */
  details{border-bottom:1px solid var(--line);padding:8px 12px}
  details summary{cursor:pointer;font-size:12.5px;font-weight:700;list-style:none}
  details summary::-webkit-details-marker{display:none}
  details summary b{color:var(--accent)}
  details pre{white-space:pre-wrap;word-break:break-word;font-size:11.5px;line-height:1.5;
    background:var(--card);border-radius:10px;padding:10px;margin-top:8px;box-shadow:var(--shadow);
    font-family:inherit;color:var(--ink)}
  .daydivider{position:sticky;top:0;background:var(--panel);backdrop-filter:blur(6px);padding:6px 12px;font-size:12px;font-weight:800;color:var(--sub);border-bottom:1px solid var(--line)}
  .tab.expandtab{margin-left:auto;background:var(--good);color:#fff}
  /* 질문종목 Q&A */
  .qna{border-bottom:1px solid var(--line);padding:10px 12px}
  .qna .q{font-weight:800;font-size:12.5px;margin-bottom:4px}
  .qna .q .tk{display:inline-block;background:var(--accent);color:#fff;border-radius:8px;padding:1px 7px;margin-right:4px;font-size:11px}
  .qna .meta{font-size:11px;color:var(--sub);margin-bottom:6px}
  .qna .verdict{display:inline-block;font-weight:800;font-size:11.5px;padding:2px 8px;border-radius:10px;background:var(--card);box-shadow:var(--shadow);margin-bottom:6px}
  /* 팝업(모달) */
  .modal{position:fixed;inset:0;z-index:50;background:rgba(20,15,35,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:2vh 2vw}
  .modal[hidden]{display:none}
  .modal-panel{background:var(--bg1);width:min(1000px,96vw);height:min(92vh,900px);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line)}
  .modal-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  .modal-head>span:first-child{font-weight:800;font-size:15px}
  .modal-tabs{display:flex;gap:4px;flex:1;overflow-x:auto}
  .modal-tabs .mtab{border:none;background:var(--card);color:var(--sub);font-weight:800;font-size:12px;padding:6px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .modal-tabs .mtab.on{background:var(--accent);color:#fff}
  .modal-close{border:none;background:var(--card);color:var(--ink);border-radius:10px;width:34px;height:34px;font-size:16px;cursor:pointer;box-shadow:var(--shadow)}
  .modal-body{flex:1;overflow:auto;padding:0}
  .modal-body .tabview,.modal-body>div{display:block!important}
  .modal-body .rptbody{font-size:14px;line-height:1.7;padding:20px 26px}
  .modal-body .rptbody h2{font-size:20px} .modal-body .rptbody h3{font-size:16px} .modal-body .rptbody h4{font-size:14px}
  .modal-body .rptbody table,.modal-body .vverdict table,.modal-body .rptbody pre.codeblk{font-size:13px}
  .modal-body .day,.modal-body .qna,.modal-body details,.modal-body .daydivider{font-size:13.5px}
  .modal-body .rptbar,.modal-body .qbar{position:sticky;top:0}
  /* 리포트 탭 */
  .rptbar{display:flex;gap:6px;padding:8px 10px;overflow-x:auto;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:1}
  .rptchip{flex:0 0 auto;border:none;background:var(--card);color:var(--ink);font-weight:800;font-size:11.5px;padding:6px 10px;border-radius:20px;cursor:pointer;box-shadow:var(--shadow)}
  .rptchip.on{background:var(--accent);color:#fff}
  .rptchip.dlbtn{background:var(--good);color:#fff;margin-left:auto;position:sticky;right:0}
  .rptbody{padding:12px 14px;font-size:12.5px;line-height:1.6}
  .rptbody h2{font-size:15px;margin:2px 0 8px}
  .rptbody h3{font-size:13.5px;margin:14px 0 6px;color:var(--accent)}
  .rptbody h4{font-size:12.5px;margin:10px 0 4px}
  .rptbody p{margin:6px 0}
  .rptbody ul{margin:6px 0;padding-left:18px}
  .rptbody li{margin:3px 0}
  .rptbody blockquote{margin:6px 0;padding:6px 10px;background:var(--card);border-left:3px solid var(--accent);border-radius:6px;color:var(--sub);font-size:11.5px}
  .rptbody hr{border:none;border-top:1px solid var(--line);margin:10px 0}
  .rptbody table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11.5px}
  .rptbody th,.rptbody td{border:1px solid var(--line);padding:5px 7px;text-align:left}
  .rptbody th{background:var(--card);font-weight:800}
  .rptbody b{font-weight:800}

</style>
</head>
<body>
  <div class="hud">
    <div class="brand"><span class="logo">🏦</span> 투자팀 미니룸</div>
    <div class="stat"><b id="s-equity">$100,000</b><span>총자산</span></div>
    <div class="stat"><b id="s-return" class="pos">+0.00%</b><span>누적 수익률</span></div>
    <div class="stat"><b id="s-cash">$100,000</b><span>현금</span></div>
    <div class="stat"><b id="s-hold">0</b><span>보유 종목</span></div>
    <div class="stat"><b id="s-wl">0 / 0</b><span>승 / 패</span></div>
    <div class="stat"><b id="s-ver">v1</b><span>활성 전략</span></div>
    <div class="light"><span class="dot" id="lightdot" style="background:#8a8"></span><span id="lighttxt">시장</span>
      <button class="theme-btn" id="themeBtn">🌗</button></div>
  </div>

  <div class="main">
    <div class="room rooms4">
      <!-- 🏢 실무진 방 -->
      <div class="rcell">
        <div class="rhead">🏢 실무진 팀</div>
        <div class="scene mini" id="scene-team">
          <div class="wall"></div>
          <div class="minichart"><svg id="miniChart" viewBox="0 0 500 180" preserveAspectRatio="none" style="width:100%;height:100%"></svg></div>
          <div class="floor"></div>
          <div class="deskrow"></div>
          <div class="stage" id="stage"><!-- 캐릭터 주입 --></div>
        </div>
      </div>
      <!-- 🔬 리서치팀 방 -->
      <div class="rcell">
        <div class="rhead">🔬 리서치팀 · Ria</div>
        <div class="scene mini" id="scene-research">
          <div class="wall wall-r"></div>
          <div class="floor"></div>
          <div class="deskrow"></div>
          <div class="stage" id="stage-research"><!-- 리서치팀 캐릭터 주입 --></div>
        </div>
      </div>
      <!-- ⚖️ 검증단 방 -->
      <div class="rcell">
        <div class="rhead">⚖️ 검증단 · Vera <small id="vDate" style="opacity:.7"></small></div>
        <div class="scene mini" id="scene-verify">
          <div class="wall wall-v"></div>
          <div class="floor"></div>
          <div class="deskrow"></div>
          <div class="stage" id="stage-verify"><!-- 검증단 캐릭터 주입 --></div>
        </div>
      </div>
      <!-- 👔 임원실 -->
      <div class="rcell">
        <div class="rhead">👔 임원실 · Victor</div>
        <div class="scene mini" id="scene-exec">
          <div class="wall"></div>
          <div class="floor"></div>
          <div class="deskrow"></div>
          <div class="stage" id="stage-exec"><!-- 임원 주입 --></div>
        </div>
      </div>
    </div>

    <div class="side">
      <div class="tabs">
        <button class="tab on" data-tab="log">💬 로그</button>
        <button class="tab" data-tab="briefing">📋 브리핑</button>
        <button class="tab" data-tab="verdict">⚖️ 검증</button>
        <button class="tab" data-tab="accounts">💼 계좌</button>
        <button class="tab" data-tab="daily">📅 일자별</button>
        <button class="tab" data-tab="curve">📈 추이</button>
        <button class="tab" data-tab="reco">📊 추천</button>
        <button class="tab" data-tab="report">📋 리포트</button>
        <button class="tab" data-tab="qna">💬 질문종목</button>
        <button class="tab expandtab" id="expandBtn" title="크게 보기(팝업)">⛶ 크게</button>
      </div>
      <div class="tabview" id="tab-log" style="display:flex;flex-direction:column">
        <h3><span>💬 팀 대화 로그</span><span id="dateLbl" style="color:var(--sub);font-weight:600"></span></h3>
        <div class="log" id="log"></div>
        <div class="recos" id="recos"></div>
      </div>
      <div class="tabview" id="tab-briefing" hidden></div>
      <div class="tabview" id="tab-verdict" hidden></div>
      <div class="tabview" id="tab-accounts" hidden></div>
      <div class="tabview" id="tab-daily" hidden></div>
      <div class="tabview" id="tab-curve" hidden></div>
      <div class="tabview" id="tab-reco" hidden></div>
      <div class="tabview" id="tab-report" hidden></div>
      <div class="tabview" id="tab-qna" hidden></div>
    </div>
  </div>

  <div class="ctrl">
    <div class="phases" id="phases"></div>
    <div class="spacer"></div>
    <button class="btn sec" id="speedBtn">속도 1x</button>
    <button class="btn" id="replayBtn">⟳ 다시 재생</button>
  </div>
  <div class="banner" id="banner">⚠️ 교육용 모의투자입니다. 투자조언이 아닙니다.</div>

  <!-- 팝업(모달) — 탭 내용을 크게 보기 -->
  <div class="modal" id="modal" hidden>
    <div class="modal-panel">
      <div class="modal-head">
        <span id="modalTitle">📋</span>
        <div class="modal-tabs" id="modalTabs"></div>
        <button class="modal-close" id="modalClose" title="닫기 (Esc)">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  // ── 캐릭터 정의 ──
  const CHARS = {
    Alex:  {role:"분석가", emoji:"🔍", color:"#2bb3c9", skin:"#ffe0bd", hair:"#44445f", jacket:"#3BC9DB", pants:"#2f6f7a", acc:"glasses"},
    Nova:  {role:"커뮤니티", emoji:"🛰️", color:"#12b3a6", skin:"#ffe0bd", hair:"#2a4a55", jacket:"#22D3C5", pants:"#17756c", acc:"antenna"},
    Sara:  {role:"리스크관리", emoji:"🛡️", color:"#8f6ff0", skin:"#ffe0bd", hair:"#6a3f63", jacket:"#B197FC", pants:"#6a4a8a", acc:"shield"},
    Jordan:{role:"트레이더", emoji:"🎧", color:"#e0a520", skin:"#f8d0a8", hair:"#7a4a22", jacket:"#FFD43B", pants:"#b08020", acc:"headset"},
    Morgan:{role:"전략가", emoji:"📖", color:"#38b85a", skin:"#ffe0bd", hair:"#33502f", jacket:"#69DB7C", pants:"#3a7a4a", acc:"book"},
    RICH:  {role:"CEO", emoji:"👑", color:"#ff5b6b", skin:"#f8d0a8", hair:"#5A3A2A", jacket:"#FF6B6B", pants:"#a03030", acc:"crown"},
  };
  const ORDER = ["Alex","Nova","Sara","Jordan","Morgan","RICH"];
  const PHASES = ["분석","리스크","거래","검토","보고"];

  function accessory(type){
    // 둥근 캐릭터(viewBox 100x116)용 — 머리 눈 y51·정수리 y12·손 소품 우측 y80
    switch(type){
      case "glasses": return '<g stroke="#2b2b3a" stroke-width="2.2" fill="rgba(255,255,255,.4)"><circle cx="41" cy="51" r="7"/><circle cx="59" cy="51" r="7"/><line x1="48" y1="51" x2="52" y2="51"/></g>';
      case "headset": return '<g><path d="M25 44 Q50 8 75 44" stroke="#3a3a4a" stroke-width="4.5" fill="none"/><rect x="20" y="40" width="9" height="15" rx="4" fill="#3a3a4a"/><rect x="71" y="40" width="9" height="15" rx="4" fill="#3a3a4a"/><path d="M72 54 Q80 58 78 67" stroke="#3a3a4a" stroke-width="2.2" fill="none"/><circle cx="78" cy="69" r="3" fill="#3a3a4a"/></g>';
      case "crown": return '<path d="M33 21 L41 31 L50 19 L59 31 L67 21 L64 35 L36 35Z" fill="#ffd43b" stroke="#e6a817" stroke-width="1.4"/><circle cx="50" cy="17" r="3" fill="#ff6b6b"/><circle cx="36" cy="24" r="2" fill="#4dabf7"/><circle cx="64" cy="24" r="2" fill="#4dabf7"/>';
      case "book": return '<g transform="rotate(-10 78 82)"><rect x="68" y="74" width="20" height="15" rx="2" fill="#fff" stroke="#3a3a4a" stroke-width="1.3"/><rect x="68" y="74" width="20" height="15" rx="2" fill="#69db7c" opacity=".35"/><line x1="78" y1="74" x2="78" y2="89" stroke="#3a3a4a" stroke-width="1.1"/></g>';
      case "shield": return '<g><path d="M71 71 L87 75 L85 88 Q78 96 71 88 Q69 79 71 71Z" fill="#fff" stroke="#8f6ff0" stroke-width="2"/><path d="M78 77 L78 90 M72 83 L84 83" stroke="#8f6ff0" stroke-width="1.8"/></g>';
      case "antenna": return '<g><line x1="50" y1="12" x2="50" y2="1" stroke="#2b6b66" stroke-width="2.2"/><circle cx="50" cy="1" r="3.2" fill="#ff5b6b"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle></g>';
      case "gavel": return '<g transform="rotate(26 80 80)"><rect x="72" y="72" width="16" height="8" rx="2.4" fill="#8a5a2b" stroke="#5f3d1c" stroke-width="1"/><rect x="78" y="80" width="4" height="15" rx="2" fill="#6a4420"/></g>';
      case "magnify": return '<g transform="rotate(16 80 80)"><circle cx="78" cy="77" r="6.8" fill="rgba(255,255,255,.4)" stroke="#2b2b3a" stroke-width="2.3"/><line x1="83" y1="82" x2="89" y2="88" stroke="#2b2b3a" stroke-width="2.9" stroke-linecap="round"/></g>';
      case "ruler": return '<g transform="rotate(-12 78 82)"><rect x="70" y="70" width="7" height="26" rx="1.3" fill="#ffd43b" stroke="#c99a10" stroke-width="1"/><line x1="70" y1="76" x2="73" y2="76" stroke="#c99a10"/><line x1="70" y1="82" x2="73" y2="82" stroke="#c99a10"/><line x1="70" y1="88" x2="73" y2="88" stroke="#c99a10"/></g>';
      default: return "";
    }
  }
  function charSVG(c){
    // 귀여운 둥근(egg) 미니미 — 부드러운 파스텔·큰 눈·볼터치
    return `<svg viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <ellipse cx="50" cy="109" rx="25" ry="4.6" fill="rgba(0,0,0,.14)"/>
      <ellipse cx="40" cy="104" rx="7" ry="4" fill="${c.pants}"/>
      <ellipse cx="60" cy="104" rx="7" ry="4" fill="${c.pants}"/>
      <path d="M50 19 C76 19 83 52 80 78 C78 99 63 106 50 106 C37 106 22 99 20 78 C17 52 24 19 50 19Z" fill="${c.jacket}"/>
      <ellipse cx="42" cy="60" rx="15" ry="23" fill="#ffffff" opacity=".13"/>
      <path d="M26 41 Q32 12 50 12 Q68 12 74 41 Q61 27 50 27 Q39 27 26 41Z" fill="${c.hair}"/>
      <circle cx="32" cy="60" r="5.2" fill="#ff9db0" opacity=".5"/>
      <circle cx="68" cy="60" r="5.2" fill="#ff9db0" opacity=".5"/>
      <ellipse cx="41" cy="51" rx="4.6" ry="5.4" fill="#2b2b3a"/>
      <ellipse cx="59" cy="51" rx="4.6" ry="5.4" fill="#2b2b3a"/>
      <circle cx="42.7" cy="49" r="1.5" fill="#fff"/>
      <circle cx="60.7" cy="49" r="1.5" fill="#fff"/>
      <path d="M44.5 62 Q50 67.5 55.5 62" stroke="#2b2b3a" stroke-width="2.1" fill="none" stroke-linecap="round"/>
      ${accessory(c.acc)}
    </svg>`;
  }

  // ── 스테이지 구성 ──
  const stage = document.getElementById("stage");
  const nodes = {};
  ORDER.forEach(name=>{
    const c = CHARS[name];
    const wrap = document.createElement("div");
    wrap.className = "char"; wrap.id = "char-"+name;
    wrap.innerHTML =
      `<div class="bubble" id="bubble-${name}"></div>
       <div class="svgwrap">${charSVG(c)}</div>
       <div class="desk"></div>
       <div class="nametag">${c.emoji} ${name} <small>${c.role}</small></div>`;
    wrap.onclick = () => showMember(name, c);
    stage.appendChild(wrap);
    nodes[name] = wrap;
  });

  // ── 검증단(AI 심의) 캐릭터 ──
  const VERIFIERS = {
    Vera:  {ko:"베라", role:"검증단 팀장", emoji:"⚖️", color:"#d05a8a", skin:"#ffe0bd", hair:"#5a2a44", jacket:"#D96BA0", pants:"#9a4570", acc:"gavel"},
    Opus:  {ko:"오퍼스", role:"심의위원장", emoji:"🟣", color:"#6a5acd", skin:"#ffe0bd", hair:"#3a3358", jacket:"#5C4D9C", pants:"#3f356e", acc:"crown"},
    Sonnet:{ko:"소넷", role:"기술 검증", emoji:"📐", color:"#4a90d9", skin:"#ffe0bd", hair:"#2a3f5a", jacket:"#4A90D9", pants:"#2f6090", acc:"ruler"},
    Haiku: {ko:"하이쿠", role:"팩트체크", emoji:"🔍", color:"#17a58c", skin:"#f8d0a8", hair:"#2a5048", jacket:"#20B89A", pants:"#177567", acc:"magnify"},
  };
  const vstage = document.getElementById("stage-verify");
  ["Vera","Opus","Sonnet","Haiku"].forEach(name=>{
    const c=VERIFIERS[name];
    const wrap=document.createElement("div"); wrap.className="char";
    wrap.innerHTML=`<div class="svgwrap">${charSVG(c)}</div><div class="desk"></div><div class="nametag">${c.emoji} ${name} <small>${c.role}</small></div>`;
    wrap.onclick = () => showMember(name, c);
    vstage.appendChild(wrap);
  });

  // ── 리서치팀 캐릭터 (노트북LM) ──
  const RESEARCHERS = {
    Ria:  {ko:"리아", role:"리서치 팀장", emoji:"🔬", color:"#c9772b", skin:"#ffe0bd", hair:"#5a3a20", jacket:"#E8955A", pants:"#a85f2a", acc:"magnify"},
    Remy: {ko:"레미", role:"섹터 리서처", emoji:"📚", color:"#b06fd0", skin:"#f8d0a8", hair:"#4a2f55", jacket:"#C08CE0", pants:"#7a4a90", acc:"book"},
  };
  const rstage = document.getElementById("stage-research");
  if(rstage){ ["Ria","Remy"].forEach(name=>{
    const c=RESEARCHERS[name];
    const wrap=document.createElement("div"); wrap.className="char";
    wrap.innerHTML=`<div class="svgwrap">${charSVG(c)}</div><div class="desk"></div><div class="nametag">${c.emoji} ${name} <small>${c.role}</small></div>`;
    wrap.onclick=()=>showMember(name,c);
    rstage.appendChild(wrap);
  }); }

  // ── 팀원 클릭 → 역할·기여 팝업 (조직: 임원 Victor · 실무진팀장 RICH · 리서치 Ria · 검증단 Vera) ──
  const MEMBER_INFO = {
    Alex:{team:"실무진",desc:"주도섹터·주도주·과열/재진입 브리핑, RS 스크리닝, 2단계 후보(돌파확인/관찰) 산출"},
    Nova:{team:"실무진",desc:"커뮤니티 버즈·종목별 심리(StockTwits) — 정성 확인용, 하이프 경계"},
    Sara:{team:"실무진",desc:"리스크관리 — 포지션 사이징, 손절/트레일링, 집중위험 관리"},
    Jordan:{team:"실무진",desc:"트레이더 — 모의 거래 기록, 보유 시세 갱신"},
    Morgan:{team:"실무진",desc:"전략가 — 추천 적중률 추적, 과열/재진입 임계값 검증·전략 진화"},
    RICH:{team:"실무진 팀장 👑",desc:"팀 총괄·최종 보고 (실무진 리더)"},
    Opus:{team:"검증단",desc:"심의위원장 — 펀더멘털·악마의 변호인·최종 판정"},
    Sonnet:{team:"검증단",desc:"기술 검증 — 기술적·모멘텀 구조"},
    Haiku:{team:"검증단",desc:"팩트체크 — 촉매·테마·함정 거르기"},
    Ria:{team:"리서치 팀장 🔬",desc:"노트북LM 기반 출처 리서치 총괄 — 장기 보유주 심층·전략문서 근거화·시장 매크로"},
    Remy:{team:"리서치",desc:"섹터 리서처 — 신규 후보 팩트체크(출처 기반)"},
    Vera:{team:"검증단 팀장 ⚖️",desc:"검증 심의 총괄 — Opus·Sonnet·Haiku 3모델 의견 종합(진실=Veritas)"},
    Victor:{team:"임원 총괄 👔",desc:"3팀장(RICH·Ria·Vera) 통솔 — 최종 종합 브리핑"},
  };
  function showMember(name, c){
    const info = MEMBER_INFO[name] || {team:"",desc:c.role||""};
    const B=(window.__NO_BRIEFING||!window.BRIEFING_DATA)?null:window.BRIEFING_DATA;
    let extra="";
    if(name==="Alex" && B){ extra=`<div style="margin-top:10px;padding:10px;background:var(--panel);border-radius:10px;font-size:12px">📋 최근 브리핑: 시장 <b>${(B.market&&B.market.light||'').toUpperCase()}</b> · 주도섹터 <b>${B.leading_sectors&&B.leading_sectors[0]?B.leading_sectors[0].name:'-'}</b> · 돌파후보 ${B.tiers?B.tiers.tier1.items.length:0}·관찰 ${B.tiers?B.tiers.tier2.items.length:0}</div>`; }
    const tabsEl=document.getElementById("modalTabs"), body=document.getElementById("modalBody");
    if(!tabsEl||!body) return;
    tabsEl.innerHTML=`<button class="mtab on">${c.emoji||''} ${name}</button>`;
    body.innerHTML=`<div class="tabview"><h3>${c.emoji||''} ${name} <small style="color:var(--sub)">${info.team}</small></h3><div style="font-size:13px;line-height:1.6">${info.desc}</div>${extra}</div>`;
    document.getElementById("modal").hidden=false;
  }

  // ── 방 전환 + 검증 판정 렌더 ──
  let vRendered=false;
  const MNAME={opus:"오퍼스",sonnet:"소넷",haiku:"하이쿠"};
  function renderVerdict(el){
    el = el || document.getElementById("tab-verdict");
    if(!el) return;
    const V=(window.__NO_VERIFY||!window.VERIFY_DATA)?null:window.VERIFY_DATA;
    const dEl=document.getElementById("vDate");
    if(!V){ el.innerHTML='<h3>⚖️ 검증단 심의</h3><div style="color:var(--sub);font-size:13px">아직 검증 기록이 없어요. <b>start investment heavy</b> 실행 시 검증단(Opus·Sonnet·Haiku)이 작동합니다.</div>'; return; }
    if(dEl) dEl.textContent='· '+V.last_run.split(" ")[0];
    const invest=V.final.invest;
    const stocks=(V.scores||[]).map(s=>{
      const picked=(V.picked||[]).includes(s.ticker);
      const j=picked?'<span class="ok">★ 선정</span>':(s.veto?'<span class="veto">❌ 거부</span>':'<span style="color:var(--sub)">관망</span>');
      let detail='';
      if(s.votes&&s.votes.length){
        const badges=s.votes.map(v=>{const ok=(v.ok!=null?v.ok:v.recommend);const nm=MNAME[String(v.model).toLowerCase()]||v.model;const sc=(v.score!=null?v.score:v.explosive_score);
          return `<span style="display:inline-block;font-size:11px;padding:1px 6px;margin:1px;border-radius:8px;background:rgba(128,128,128,.15);color:${ok?'#22b07d':'#e5484d'}"><b>${nm}</b> ${sc} ${ok?'👍승인':'👎거부'}</span>`;}).join(' ');
        const ops=s.votes.filter(v=>v.opinion||v.bull||v.bear).map(v=>{const nm=MNAME[String(v.model).toLowerCase()]||v.model;const ok=(v.ok!=null?v.ok:v.recommend);
          return `<div style="font-size:11px;color:var(--sub);margin-top:2px"><b style="color:inherit">${nm}:</b> ${esc(v.opinion||(ok?v.bull:v.bear)||'')}</div>`;}).join('');
        const devil=s.devil?`<div style="font-size:11px;margin-top:4px;color:${s.devil.veto?'#e5484d':'#22b07d'}">😈 악마의 변호인(오퍼스): <b>${s.devil.veto?'거부':'통과'}</b> — <span style="color:var(--sub)">${esc(s.devil.reason||s.devil.strongest_bear||'')}</span></div>`:'';
        detail=`<div style="margin-top:5px">${badges}${ops}${devil}</div>`;
      }

  // 경량 마크다운 → HTML (리포트 렌더용)
  function mdToHtml(md){
    const inl=(s)=>esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");
    const lines=String(md||"").split("\n"); let h="",i=0;
    while(i<lines.length){
      const ln=lines[i];
      if(/^```/.test(ln)){ i++; const code=[]; while(i<lines.length && !/^```/.test(lines[i])){ code.push(lines[i]); i++; } i++; h+='<pre class="codeblk" title="클릭하면 전체 선택">'+esc(code.join("\n"))+'</pre>'; continue; }
      if(/^### /.test(ln)){ h+="<h4>"+inl(ln.slice(4))+"</h4>"; i++; continue; }
      if(/^## /.test(ln)){ h+="<h3>"+inl(ln.slice(3))+"</h3>"; i++; continue; }
      if(/^# /.test(ln)){ h+="<h2>"+inl(ln.slice(2))+"</h2>"; i++; continue; }
      if(/^> /.test(ln)){ h+="<blockquote>"+inl(ln.slice(2))+"</blockquote>"; i++; continue; }
      if(/^---\s*$/.test(ln)){ h+="<hr>"; i++; continue; }
      if(/^\|/.test(ln) && i+1<lines.length && /^\|[\s:|-]+\|$/.test(lines[i+1].trim())){
        const hd=ln.split("|").slice(1,-1).map(c=>c.trim()); i+=2; const rows=[];
        while(i<lines.length && /^\|/.test(lines[i])){ rows.push(lines[i].split("|").slice(1,-1).map(c=>c.trim())); i++; }
        h+="<table><thead><tr>"+hd.map(c=>"<th>"+inl(c)+"</th>").join("")+"</tr></thead><tbody>"+
           rows.map(r=>"<tr>"+r.map(c=>"<td>"+inl(c)+"</td>").join("")+"</tr>").join("")+"</tbody></table>"; continue;
      }
      if(/^- /.test(ln)){ const it=[]; while(i<lines.length && /^- /.test(lines[i])){ it.push("<li>"+inl(lines[i].slice(2))+"</li>"); i++; } h+="<ul>"+it.join("")+"</ul>"; continue; }
      if(ln.trim()===""){ i++; continue; }
      h+="<p>"+inl(ln)+"</p>"; i++;
    }
    return h;
  }

    el = el || $("tab-qna");
    const Q=(window.__NO_QNA||!window.QNA_DATA)?[]:window.QNA_DATA;
    if(!Q.length){ el.innerHTML='<div class="empty">아직 질문한 종목 기록이 없어요.<br>특정 종목을 물어보면 여기에 답변·판정이 일자별로 쌓입니다.</div>'; return; }
    const items=[...Q].reverse();
    el.innerHTML=items.map(q=>`<div class="qna">
      <div class="q">${(q.tickers||[]).map(t=>`<span class="tk">${esc(t)}</span>`).join("")} ${esc(q.question)}</div>
      <div class="meta">📅 ${esc(q.date)} · <span class="verdict">${esc(q.verdict||"")}</span></div>
      <div class="rptbody">${mdToHtml(q.answer)}</div>
    </div>`).join("");
    el.querySelectorAll(".codeblk").forEach(pre=>pre.onclick=()=>{const rg=document.createRange();rg.selectNodeContents(pre);const s=getSelection();s.removeAllRanges();s.addRange(rg);});
  }

  // ── 💼 계좌 탭 (모의 + 실제 장기/단기, 각각 독립 표시) ──
  function wonf(n){ n=Math.round(Number(n)||0); const s=n<0?'-':''; n=Math.abs(n);
    if(n>=1e8) return s+(n/1e8).toFixed(2).replace(/\.?0+$/,'')+'억';
    return s+Math.round(n/1e4).toLocaleString()+'만'; }
  function pbar(pctv){ const w=Math.max(0,Math.min(100,Number(pctv)||0));
    return `<div style="height:9px;background:rgba(128,128,128,.22);border-radius:6px;overflow:hidden;margin:7px 0 4px">`
      +`<div style="height:100%;width:${w}%;background:linear-gradient(90deg,#22b07d,#3aa0ff)"></div></div>`; }
  function acctCardReal(a){
    const pc=a.unrealized_pnl_pct>=0?'pos':'neg';
    const holds=(a.holdings||[]).map(h=>{const c=h.pnl_pct>=0?'pos':'neg';
      return `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-top:1px solid rgba(128,128,128,.12)">`
        +`<span><b>${h.ticker}</b> <span style="color:var(--sub)">${h.shares}주·비중${h.weight_pct}%</span></span>`
        +`<span class="${c}">${h.pnl_pct>=0?'+':''}${h.pnl_pct}%</span></div>`;}).join('');
    return `<div style="background:var(--panel);border:1px solid rgba(128,128,128,.18);border-radius:12px;padding:12px 14px;margin-bottom:12px">`
      +`<div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:14px">${a.emoji} ${a.name}</b>`
      +`<span class="${pc}" style="font-weight:800">${a.unrealized_pnl_pct>=0?'+':''}${a.unrealized_pnl_pct}% <span style="color:var(--sub);font-weight:600;font-size:11px">평가손익</span></span></div>`
      +`<div style="font-size:20px;font-weight:800;margin-top:6px">${wonf(a.current_krw)}<span style="color:var(--sub);font-size:13px;font-weight:600"> / 목표 ${wonf(a.target_krw)}</span></div>`
      +pbar(a.progress_pct)
      +`<div style="font-size:12px;color:var(--sub)">🎯 목표 달성률 <b style="color:var(--fg,inherit)">${a.progress_pct}%</b> · 남은 ${wonf(a.remaining_krw)}</div>`
      +(holds?`<div style="margin-top:8px">${holds}</div>`:`<div style="font-size:12px;color:var(--sub);margin-top:6px">💵 현금 100% (관망)</div>`)
      +`</div>`;
  }
  function acctCardMock(h){
    const r=Number(h.total_return_pct)||0, c=r>=0?'pos':'neg';
    return `<div style="background:var(--panel);border:1px solid rgba(128,128,128,.18);border-radius:12px;padding:12px 14px;margin-bottom:12px">`
      +`<div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:14px">🧪 모의투자 (페이퍼)</b>`
      +`<span class="${c}" style="font-weight:800">${r>=0?'+':''}${r.toFixed(2)}%</span></div>`
      +`<div style="font-size:20px;font-weight:800;margin-top:6px">${money(h.equity)}<span style="color:var(--sub);font-size:13px;font-weight:600"> / 시작 ${money(h.initial_capital||100000)}</span></div>`
      +`<div style="font-size:12px;color:var(--sub);margin-top:4px">전략 실험·훈련용 · 보유 ${h.holdings_count||0}종목 · 승 ${h.wins||0}/패 ${h.losses||0}</div></div>`;
  }
  function renderAccounts(el){
    el = el || $("tab-accounts");
    const RA=(window.__NO_REAL||!window.REAL_ACCOUNTS_DATA)?null:window.REAL_ACCOUNTS_DATA;
    let html=`<h3><span>💼 포트폴리오 현황</span><span style="color:var(--sub);font-weight:600">각 계좌 독립 · ${RA&&RA.generated?RA.generated:''}</span></h3>`;
    if(RA&&RA.accounts){ for(const k of ['long','short']){ if(RA.accounts[k]) html+=acctCardReal(RA.accounts[k]); } }
    html+=acctCardMock(DATA.hud||{});
    if(!RA) html+=`<div style="font-size:12px;color:var(--sub)">실제 계좌 데이터 없음 — 'start investment' 후 표시됩니다.</div>`;
    el.innerHTML=html;
  }

  // ── 📋 브리핑 탭 (시장국면·주도섹터·주도주·과열·2단계후보·보유주점검) ──
  function lightBadge(l){ const m={green:['🟢','#22b07d'],yellow:['🟡','#e2a03f'],red:['🔴','#e5484d']}; const x=m[l]||m.yellow;
    return `<span style="color:${x[1]};font-weight:800">${x[0]} ${String(l||'').toUpperCase()}</span>`; }
  function ohBadge(o){ if(!o) return ''; const c=o.status==='overheat'?'#e5484d':o.status==='reentry'||o.status==='extreme'?'#22b07d':'var(--sub)';
    return `<span style="color:${c};font-size:11px">${o.label||''}</span>`; }
  function renderBriefing(el){
    el = el || $("tab-briefing");
    const B=(window.__NO_BRIEFING||!window.BRIEFING_DATA)?null:window.BRIEFING_DATA;
    if(!B){ el.innerHTML=`<h3>📋 브리핑</h3><div style="color:var(--sub);font-size:13px">아직 브리핑 데이터가 없어요 — 'start investment' 실행 후 표시됩니다.</div>`; return; }
    const secs=(B.leading_sectors||[]).map(s=>`${s.name} <b>${Math.round(s.sharePct)}%</b>`).join(' · ');
    const stocks=(B.leading_stocks||[]).slice(0,8).map(s=>`<a href="https://finviz.com/quote.ashx?t=${s.ticker}" target="_blank" style="text-decoration:none;color:inherit"><b>${s.ticker}</b></a> <span style="color:var(--sub);font-size:11px">RS${s.rsTop||'?'}</span> ${ohBadge(s.overheat)}`).join('<br>');
    const tierItems=t=>(t.items||[]).map(it=>{
      const ta=it.ta;
      const taLine = ta ? `<div style="font-size:10.5px;color:var(--sub);margin-top:1px">📐 $${ta.price} · 50MA ${ta.distMA50>0?'+':''}${ta.distMA50}%${ta.near50?' 🎯도달':''} · 고점 ${ta.pullbackFromHigh}% · ${ta.brokeResistance?'<span style="color:#22b07d">돌파 ✓</span>':'저항 $'+ta.resistance+' 미돌파'} · 추세 ${ta.trend}</div>` : '';
      return `<div style="padding:4px 0;border-top:1px solid rgba(128,128,128,.12);font-size:12px"><div style="display:flex;justify-content:space-between"><span><a href="${it.chart}" target="_blank" style="color:inherit"><b>${it.ticker}</b></a> <span style="color:var(--sub)">${it.industry||''} · RS${it.rsTop} · ${it.volx}x</span></span>${ohBadge(it.overheat)}</div>${taLine}</div>`;
    }).join('')||'<div style="color:var(--sub);font-size:12px">없음</div>';
    const holds=B.holdings_review&&B.holdings_review.long?B.holdings_review.long.holdings.map(h=>{const al=h.advice&&h.advice.includes('차익')?'#e5484d':h.advice&&h.advice.includes('재진입')?'#22b07d':'var(--sub)';
      return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-top:1px solid rgba(128,128,128,.12);font-size:12px"><span><b>${h.ticker}</b> <span style="color:var(--sub)">${h.inUniverse?'RS'+h.rsTop+' 200div'+(h.div200!=null?Math.round(h.div200)+'%':'-'):'유니버스밖'}</span></span><span style="color:${al}">${h.advice}</span></div>`;}).join(''):'';
    const box=(title,inner)=>`<div style="background:var(--panel);border:1px solid rgba(128,128,128,.18);border-radius:12px;padding:12px 14px;margin-bottom:12px"><div style="font-weight:800;font-size:13px;margin-bottom:7px">${title}</div>${inner}</div>`;
    const W=(window.__NO_WATCH||!window.WATCHLIST_DATA)?null:window.WATCHLIST_DATA;
    const watchInner = W&&W.items&&W.items.length ? W.items.map(w=>{const col=w.status==='bounce'?'#22b07d':w.status==='broke_down'?'#e5484d':'#e2a03f';return `<div style="font-size:12px;padding:2px 0"><b>${w.ticker}</b> <span style="color:${col};font-weight:700">${w.flag}</span>${w.ta?`<div style="font-size:10.5px;color:var(--sub)">${w.ta.summary}</div>`:''}${w.trigger?`<div style="font-size:10px;color:var(--sub)">🎯 트리거: ${w.trigger}</div>`:''}</div>`;}).join('') : null;
    el.innerHTML=`<h3><span>📋 오늘의 브리핑</span><span style="color:var(--sub);font-weight:600">${B.generated||''}</span></h3>`
      +box(`🚦 시장국면 ${lightBadge(B.market&&B.market.light)}`,
        ((a=>a?`<div style="font-size:11.5px;padding:7px 9px;background:rgba(128,128,128,.12);border-radius:9px;margin-bottom:6px"><b>📐 ARKK 스테이지: ${a.stage}</b> · 【${a.국면}】<br><span style="color:var(--sub)">월봉10 ${a.m10.dirKo} · 주봉30 ${a.w30.dirKo} · 가격 ${a.w30.priceAbove?'>':'<'}주봉30 ($${a.price})</span><br>👉 <b>${a.action}</b></div>`:'')(B.market&&B.market.arkk))
        +`<div style="font-size:11.5px;color:var(--sub)">🔥 과열(200div+150↑) ${B.overheat?B.overheat.over150:'-'}개 · 최대 ${B.overheat&&B.overheat.max?Math.round(B.overheat.max)+'%':'-'} · 200일선위 ${B.market&&B.market.breadth_pct!=null?B.market.breadth_pct+'%':'-'}</div>`)
      +(watchInner?box('👀 감시 종목 (반등 대기)',watchInner):'')
      +box('🏆 주도 섹터',`<div style="font-size:12px">${secs}</div>`)
      +box('🎯 주도 종목 (RS 상위 + 과열)',`<div style="font-size:12px;line-height:1.9">${stocks}</div>`)
      +box(`🚀 ${B.tiers.tier1.label} (${B.tiers.tier1.items.length})`,`<div style="font-size:11px;color:var(--sub);margin-bottom:4px">${B.tiers.tier1.note}</div>`+tierItems(B.tiers.tier1))
      +box(`👀 ${B.tiers.tier2.label} (${B.tiers.tier2.items.length})`,`<div style="font-size:11px;color:var(--sub);margin-bottom:4px">${B.tiers.tier2.note}</div>`+tierItems(B.tiers.tier2))
      +(holds?box('💰 장기 보유주 점검',holds):'');
  }

  // 탭 전환
  const rendered={};
  const RENDERERS={briefing:renderBriefing,verdict:renderVerdict,accounts:renderAccounts,daily:renderDaily,curve:renderCurve,reco:renderReco,report:renderReports,qna:renderQna};
  document.querySelectorAll(".tab[data-tab]").forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.dataset.tab;
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b===btn));
      ["log","briefing","verdict","accounts","daily","curve","reco","report","qna"].forEach(k=>{ $("tab-"+k).hidden = (k!==t); });
      if(!rendered[t] && RENDERERS[t]){ RENDERERS[t](); rendered[t]=true; }
    };
  });

  // ── 팝업(모달) — 탭 내용 크게 보기 ──
  const MODAL_TABS=[{k:"briefing",label:"📋 브리핑"},{k:"verdict",label:"⚖️ 검증"},{k:"accounts",label:"💼 계좌"},{k:"report",label:"📋 리포트"},{k:"daily",label:"📅 일자별"},{k:"curve",label:"📈 추이"},{k:"reco",label:"📊 추천"},{k:"qna",label:"💬 질문종목"}];
  function openModal(startTab){
    const tabsEl=$("modalTabs"), body=$("modalBody");
    tabsEl.innerHTML=MODAL_TABS.map(t=>`<button class="mtab" data-k="${t.k}">${t.label}</button>`).join("");
    const showTab=(k)=>{
      const t=MODAL_TABS.find(x=>x.k===k)||MODAL_TABS[0];
      tabsEl.querySelectorAll(".mtab").forEach(b=>b.classList.toggle("on",b.dataset.k===t.k));
      body.innerHTML="";
      const wrap=document.createElement("div"); wrap.className="tabview"; body.appendChild(wrap);
      RENDERERS[t.k](wrap);
      body.scrollTop=0;
    };
    tabsEl.querySelectorAll(".mtab").forEach(b=>b.onclick=()=>showTab(b.dataset.k));
    showTab(MODAL_TABS.some(x=>x.k===startTab)?startTab:"report");
    $("modal").hidden=false;
  }
  function closeModal(){ $("modal").hidden=true; }
  $("expandBtn").onclick=()=>{ const on=document.querySelector(".tab[data-tab].on"); openModal(on?on.dataset.tab:"report"); };
  $("modalClose").onclick=closeModal;
  $("modal").onclick=(e)=>{ if(e.target===$("modal")) closeModal(); };
  document.addEventListener("keydown",e=>{ if(e.key==="Escape" && !$("modal").hidden) closeModal(); });

  // ── 시작 ──
  renderHUD();
  if(isDemo){ $("banner").textContent="ℹ️ 데모 모드 — 실제 실행 데이터가 없습니다. 터미널에서 'npm run start-investment' 실행 후 새로고침하세요."; }
  else if(DATA.source==='simulation'){ $("banner").textContent="🎬 데모 시뮬레이션 데이터입니다 — 실제 매매는 'npm run start-investment' 로 시작하세요. (교육용 모의투자)"; }
  play();
})();
</script>
</body>
</html>
