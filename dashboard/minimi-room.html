<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🏠 투자팀 미니룸</title>
<!-- 실행 데이터: start-investment 가 생성. 없으면 데모 아이들 상태로 표시 -->
<script src="data/latest-run.js" onerror="window.__NO_DATA=true"></script>
<script src="data/history.js" onerror="window.__NO_HISTORY=true"></script>
<style>
  :root{
    --bg1:#ffe8f0; --bg2:#e7f0ff; --floor:#f6d9b8; --floor2:#eac59a;
    --wall:#fbeaf2; --panel:rgba(255,255,255,.82); --ink:#3a2f4a; --sub:#8a7f9a;
    --card:#ffffff; --line:rgba(120,90,150,.18); --accent:#ff7aa8; --good:#22b07d; --bad:#e5484d;
    --shadow:0 8px 26px rgba(150,110,160,.22);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg1:#241b3a; --bg2:#181a34; --floor:#3a3350; --floor2:#2e2842;
      --wall:#2a2142; --panel:rgba(38,30,58,.82); --ink:#f0e9ff; --sub:#a99fc4;
      --card:#2c2446; --line:rgba(180,150,220,.18); --accent:#ff8fb8; --good:#3ddc97; --bad:#ff6b70;
      --shadow:0 8px 26px rgba(0,0,0,.4);}
  }
  :root[data-theme="light"]{ --bg1:#ffe8f0; --bg2:#e7f0ff; --floor:#f6d9b8; --floor2:#eac59a; --wall:#fbeaf2; --panel:rgba(255,255,255,.82); --ink:#3a2f4a; --sub:#8a7f9a; --card:#fff; --line:rgba(120,90,150,.18); --good:#22b07d; --bad:#e5484d; }
  :root[data-theme="dark"]{ --bg1:#241b3a; --bg2:#181a34; --floor:#3a3350; --floor2:#2e2842; --wall:#2a2142; --panel:rgba(38,30,58,.82); --ink:#f0e9ff; --sub:#a99fc4; --card:#2c2446; --line:rgba(180,150,220,.18); --good:#3ddc97; --bad:#ff6b70; }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Malgun Gothic","Apple SD Gothic Neo",-apple-system,system-ui,sans-serif;
    color:var(--ink); background:linear-gradient(160deg,var(--bg1),var(--bg2)); min-height:100%;
    display:flex; flex-direction:column;
  }
  /* ── 상단 HUD ── */
  .hud{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .brand{font-weight:800;font-size:18px;margin-right:6px;display:flex;align-items:center;gap:8px}
  .brand .logo{font-size:22px}
  .stat{display:flex;flex-direction:column;padding:4px 12px;border-radius:12px;background:var(--card);
    box-shadow:var(--shadow);min-width:96px}
  .stat b{font-size:16px;line-height:1.2}
  .stat span{font-size:11px;color:var(--sub)}
  .pos{color:var(--good)} .neg{color:var(--bad)}
  .light{margin-left:auto;display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
  .dot{width:14px;height:14px;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.25)}
  .theme-btn{border:none;background:var(--card);color:var(--ink);border-radius:10px;padding:6px 10px;cursor:pointer;box-shadow:var(--shadow);font-size:13px}

  /* ── 본문: 룸 + 로그 ── */
  .main{flex:1;display:grid;grid-template-columns:1fr 300px;gap:0;min-height:0}
  @media(max-width:820px){.main{grid-template-columns:1fr}}

  .room{position:relative;overflow:hidden}
  /* 뒷벽 */
  .wall{position:absolute;inset:0 0 34% 0;background:
    radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.14), transparent 60%),var(--wall)}
  /* 바닥 (원근) */
  .floor{position:absolute;left:0;right:0;bottom:0;height:36%;
    background:linear-gradient(var(--floor),var(--floor2));
    box-shadow:inset 0 6px 16px rgba(0,0,0,.08)}
  .floor::before{content:"";position:absolute;inset:0;
    background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.05) 0 2px,transparent 2px 64px);}
  /* 차트 월 */
  .chartwall{position:absolute;top:6%;left:50%;transform:translateX(-50%);
    width:min(58%,520px);height:38%;background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    border:3px solid rgba(255,255,255,.4);padding:8px;overflow:hidden}
  .chartwall .cap{position:absolute;top:6px;left:12px;font-size:11px;color:var(--sub);font-weight:700}
  .plant{position:absolute;bottom:34%;font-size:34px;filter:drop-shadow(0 4px 3px rgba(0,0,0,.15))}

  /* 캐릭터 스테이션 */
  .stage{position:absolute;left:0;right:0;bottom:4%;display:flex;justify-content:center;
    align-items:flex-end;gap:min(3.4vw,42px);padding:0 12px}
  .char{position:relative;width:clamp(78px,12vw,120px);display:flex;flex-direction:column;align-items:center;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);filter:saturate(.96)}
  .char .svgwrap{width:100%;animation:idle 2.8s ease-in-out infinite}
  .char.active{transform:translateY(-16px) scale(1.08);z-index:5}
  .char.active .svgwrap{animation:talk .5s ease-in-out infinite}
  .char.dim{opacity:.55;filter:grayscale(.25) saturate(.8)}
  .desk{width:86%;height:14px;border-radius:6px;background:var(--floor2);box-shadow:var(--shadow);margin-top:-6px}
  .nametag{margin-top:6px;font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--card);box-shadow:var(--shadow);white-space:nowrap}
  .nametag small{color:var(--sub);font-weight:600}
  @keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes talk{0%,100%{transform:translateY(-6px) rotate(-1.5deg)}50%{transform:translateY(0) rotate(1.5deg)}}

  /* 말풍선 */
  .bubble{position:absolute;bottom:112%;left:50%;transform:translateX(-50%) scale(.6);
    background:var(--card);color:var(--ink);border-radius:14px;padding:9px 12px;font-size:13px;line-height:1.35;
    width:max-content;max-width:230px;box-shadow:var(--shadow);border:1px solid var(--line);
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);font-weight:600}
  .bubble.show{opacity:1;transform:translateX(-50%) scale(1)}
  .bubble::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:8px solid transparent;border-top-color:var(--card)}

  /* 오른쪽 로그 */
  .side{background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .side h3{margin:0;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .log{flex:1;overflow:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .msg{display:flex;gap:8px;align-items:flex-start;animation:pop .3s ease}
  .msg .who{font-weight:800;font-size:11px;padding:2px 7px;border-radius:8px;color:#fff;white-space:nowrap;flex-shrink:0}
  .msg .txt{font-size:12.5px;line-height:1.4}
  @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .recos{border-top:1px solid var(--line);padding:10px 12px;max-height:34%;overflow:auto}
  .recos .r{font-size:12px;padding:6px 8px;border-radius:10px;background:var(--card);margin-bottom:6px;box-shadow:var(--shadow)}
  .recos .r b{color:var(--accent)}

  /* 하단 컨트롤 */
  .ctrl{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--panel);border-top:1px solid var(--line)}
  .phases{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--sub);flex-wrap:wrap}
  .ph{padding:3px 10px;border-radius:20px;background:var(--card);transition:.3s}
  .ph.on{background:var(--accent);color:#fff;font-weight:800}
  .btn{border:none;border-radius:10px;padding:7px 14px;cursor:pointer;font-weight:800;font-size:13px;background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .btn.sec{background:var(--card);color:var(--ink)}
  .spacer{flex:1}
  .banner{background:var(--card);color:var(--sub);font-size:12px;padding:6px 14px;text-align:center;border-top:1px solid var(--line)}

  /* 탭 */
  .tabs{display:flex;gap:2px;padding:8px 6px 0;border-bottom:1px solid var(--line)}
  .tab{border:none;background:transparent;color:var(--sub);font-weight:800;font-size:11.5px;padding:7px 7px;border-radius:10px 10px 0 0;cursor:pointer;white-space:nowrap}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  .tabview{flex:1;overflow:auto;min-height:0}
  .tabview[hidden]{display:none}
  /* 일자별 */
  .day{border-bottom:1px solid var(--line);padding:10px 12px}
  .day-h{font-weight:800;font-size:12.5px;margin-bottom:6px;display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap}
  .day-h .ret{font-weight:800}
  .day-sec{font-size:11px;color:var(--sub);font-weight:800;margin:6px 0 3px}
  .trade{font-size:12px;padding:5px 8px;border-radius:9px;background:var(--card);margin-bottom:4px;box-shadow:var(--shadow)}
  .trade .why{color:var(--sub);font-size:11px}
  .trade .rp{font-weight:800}
  .trade .lesson{display:block;margin-top:3px;color:var(--bad);font-size:11px;line-height:1.35}
  .trade .note{display:block;margin-top:3px;color:var(--good);font-size:11px;line-height:1.35}
  .empty{color:var(--sub);font-size:12px;padding:16px;text-align:center}
  /* 추천·분석 */
  details{border-bottom:1px solid var(--line);padding:8px 12px}
  details summary{cursor:pointer;font-size:12.5px;font-weight:700;list-style:none}
  details summary::-webkit-details-marker{display:none}
  details summary b{color:var(--accent)}
  details pre{white-space:pre-wrap;word-break:break-word;font-size:11.5px;line-height:1.5;
    background:var(--card);border-radius:10px;padding:10px;margin-top:8px;box-shadow:var(--shadow);
    font-family:inherit;color:var(--ink)}
  .daydivider{position:sticky;top:0;background:var(--panel);backdrop-filter:blur(6px);padding:6px 12px;font-size:12px;font-weight:800;color:var(--sub);border-bottom:1px solid var(--line)}
</style>
</head>
<body>
  <div class="hud">
    <div class="brand"><span class="logo">🏦</span> 투자팀 미니룸</div>
    <div class="stat"><b id="s-equity">$100,000</b><span>총자산</span></div>
    <div class="stat"><b id="s-return" class="pos">+0.00%</b><span>누적 수익률</span></div>
    <div class="stat"><b id="s-cash">$100,000</b><span>현금</span></div>
    <div class="stat"><b id="s-hold">0</b><span>보유 종목</span></div>
    <div class="stat"><b id="s-wl">0 / 0</b><span>승 / 패</span></div>
    <div class="stat"><b id="s-ver">v1</b><span>활성 전략</span></div>
    <div class="light"><span class="dot" id="lightdot" style="background:#8a8"></span><span id="lighttxt">시장</span>
      <button class="theme-btn" id="themeBtn">🌗</button></div>
  </div>

  <div class="main">
    <div class="room">
      <div class="wall"></div>
      <div class="chartwall">
        <span class="cap">📈 RS 차트 월</span>
        <svg id="miniChart" viewBox="0 0 500 180" preserveAspectRatio="none" style="width:100%;height:100%"></svg>
      </div>
      <div class="plant" style="left:3%">🪴</div>
      <div class="plant" style="right:3%">🌿</div>
      <div class="floor"></div>
      <div class="stage" id="stage"><!-- 캐릭터 주입 --></div>
    </div>

    <div class="side">
      <div class="tabs">
        <button class="tab on" data-tab="log">💬 로그</button>
        <button class="tab" data-tab="daily">📅 일자별</button>
        <button class="tab" data-tab="curve">📈 추이</button>
        <button class="tab" data-tab="reco">📊 추천</button>
      </div>
      <div class="tabview" id="tab-log" style="display:flex;flex-direction:column">
        <h3><span>💬 팀 대화 로그</span><span id="dateLbl" style="color:var(--sub);font-weight:600"></span></h3>
        <div class="log" id="log"></div>
        <div class="recos" id="recos"></div>
      </div>
      <div class="tabview" id="tab-daily" hidden></div>
      <div class="tabview" id="tab-curve" hidden></div>
      <div class="tabview" id="tab-reco" hidden></div>
    </div>
  </div>

  <div class="ctrl">
    <div class="phases" id="phases"></div>
    <div class="spacer"></div>
    <button class="btn sec" id="speedBtn">속도 1x</button>
    <button class="btn" id="replayBtn">⟳ 다시 재생</button>
  </div>
  <div class="banner" id="banner">⚠️ 교육용 모의투자입니다. 투자조언이 아닙니다.</div>

<script>
(function(){
  "use strict";
  // ── 캐릭터 정의 ──
  const CHARS = {
    Alex:  {role:"분석가", emoji:"🔍", color:"#2bb3c9", skin:"#ffe0bd", hair:"#44445f", jacket:"#3BC9DB", pants:"#2f6f7a", acc:"glasses"},
    Nova:  {role:"커뮤니티", emoji:"🛰️", color:"#12b3a6", skin:"#ffe0bd", hair:"#2a4a55", jacket:"#22D3C5", pants:"#17756c", acc:"antenna"},
    Sara:  {role:"리스크관리", emoji:"🛡️", color:"#8f6ff0", skin:"#ffe0bd", hair:"#6a3f63", jacket:"#B197FC", pants:"#6a4a8a", acc:"shield"},
    Jordan:{role:"트레이더", emoji:"🎧", color:"#e0a520", skin:"#f8d0a8", hair:"#7a4a22", jacket:"#FFD43B", pants:"#b08020", acc:"headset"},
    Morgan:{role:"전략가", emoji:"📖", color:"#38b85a", skin:"#ffe0bd", hair:"#33502f", jacket:"#69DB7C", pants:"#3a7a4a", acc:"book"},
    RICH:  {role:"CEO", emoji:"👑", color:"#ff5b6b", skin:"#f8d0a8", hair:"#5A3A2A", jacket:"#FF6B6B", pants:"#a03030", acc:"crown"},
  };
  const ORDER = ["Alex","Nova","Sara","Jordan","Morgan","RICH"];
  const PHASES = ["분석","리스크","거래","검토","보고"];

  function accessory(type){
    switch(type){
      case "glasses": return '<g stroke="#2b2b3a" stroke-width="2.4" fill="rgba(255,255,255,.35)"><circle cx="50" cy="52" r="8"/><circle cx="70" cy="52" r="8"/><line x1="58" y1="52" x2="62" y2="52"/></g>';
      case "headset": return '<g><path d="M32 48 Q60 6 88 48" stroke="#333" stroke-width="5" fill="none"/><rect x="26" y="44" width="11" height="18" rx="5" fill="#333"/><rect x="83" y="44" width="11" height="18" rx="5" fill="#333"/><path d="M84 58 Q94 62 92 74" stroke="#333" stroke-width="2.5" fill="none"/><circle cx="92" cy="76" r="3.5" fill="#333"/></g>';
      case "crown": return '<path d="M40 24 L48 34 L60 22 L72 34 L80 24 L77 38 L43 38 Z" fill="#ffd43b" stroke="#e6a817" stroke-width="1.6"/><circle cx="60" cy="20" r="3.4" fill="#ff6b6b"/><circle cx="43" cy="26" r="2.4" fill="#4dabf7"/><circle cx="77" cy="26" r="2.4" fill="#4dabf7"/>';
      case "book": return '<g transform="rotate(-12 88 120)"><rect x="78" y="112" width="22" height="17" rx="2" fill="#fff" stroke="#333" stroke-width="1.5"/><rect x="78" y="112" width="22" height="17" rx="2" fill="#69db7c" opacity=".35"/><line x1="89" y1="112" x2="89" y2="129" stroke="#333" stroke-width="1.2"/></g>';
      case "shield": return '<g><path d="M82 106 L100 110 L98 126 Q90 135 82 126 Q80 116 82 106Z" fill="#fff" stroke="#8f6ff0" stroke-width="2.2"/><path d="M90 112 L90 128 M84 119 L96 119" stroke="#8f6ff0" stroke-width="2"/></g>';
      case "antenna": return '<g><line x1="60" y1="17" x2="60" y2="3" stroke="#2b6b66" stroke-width="2.4"/><circle cx="60" cy="2.5" r="3.6" fill="#ff5b6b"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle><path d="M50 8 Q60 -1 70 8" stroke="#12b3a6" stroke-width="2" fill="none" opacity=".55"/><path d="M45 12 Q60 -4 75 12" stroke="#12b3a6" stroke-width="1.6" fill="none" opacity=".35"/></g>';
      default: return "";
    }
  }
  function charSVG(c){
    return `<svg viewBox="0 0 120 168" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <ellipse cx="60" cy="160" rx="33" ry="7" fill="rgba(0,0,0,.14)"/>
      <rect x="45" y="118" width="12" height="30" rx="6" fill="${c.pants}"/>
      <rect x="63" y="118" width="12" height="30" rx="6" fill="${c.pants}"/>
      <ellipse cx="51" cy="149" rx="9" ry="5" fill="#3a3340"/>
      <ellipse cx="69" cy="149" rx="9" ry="5" fill="#3a3340"/>
      <rect x="26" y="82" width="12" height="40" rx="6" fill="${c.jacket}"/>
      <rect x="82" y="82" width="12" height="40" rx="6" fill="${c.jacket}"/>
      <rect x="36" y="76" width="48" height="52" rx="18" fill="${c.jacket}"/>
      <circle cx="32" cy="122" r="7" fill="${c.skin}"/>
      <circle cx="88" cy="122" r="7" fill="${c.skin}"/>
      <rect x="54" y="66" width="12" height="14" fill="${c.skin}"/>
      <circle cx="60" cy="48" r="28" fill="${c.skin}"/>
      <path d="M31 46 Q33 16 60 16 Q87 16 89 46 Q80 32 60 32 Q40 32 31 46Z" fill="${c.hair}"/>
      <circle cx="44" cy="58" r="4" fill="#ffb3c1" opacity=".55"/>
      <circle cx="76" cy="58" r="4" fill="#ffb3c1" opacity=".55"/>
      <circle cx="50" cy="52" r="3.2" fill="#2b2b3a"/>
      <circle cx="70" cy="52" r="3.2" fill="#2b2b3a"/>
      <path d="M54 60 Q60 66 66 60" stroke="#2b2b3a" stroke-width="2" fill="none" stroke-linecap="round"/>
      ${accessory(c.acc)}
    </svg>`;
  }

  // ── 스테이지 구성 ──
  const stage = document.getElementById("stage");
  const nodes = {};
  ORDER.forEach(name=>{
    const c = CHARS[name];
    const wrap = document.createElement("div");
    wrap.className = "char"; wrap.id = "char-"+name;
    wrap.innerHTML =
      `<div class="bubble" id="bubble-${name}"></div>
       <div class="svgwrap">${charSVG(c)}</div>
       <div class="desk"></div>
       <div class="nametag">${c.emoji} ${name} <small>${c.role}</small></div>`;
    stage.appendChild(wrap);
    nodes[name] = wrap;
  });

  // ── 미니 캔들 차트 (장식) ──
  (function drawChart(){
    const svg = document.getElementById("miniChart");
    let x=14, seed=42, html="";
    let prev=90;
    for(let i=0;i<28;i++){
      seed=(seed*9301+49297)%233280; const rnd=seed/233280;
      const dir = rnd>0.42?1:-1; const body=8+rnd*26;
      const open=prev; const close=Math.max(20,Math.min(150, open - dir*body));
      const top=Math.min(open,close)-4-rnd*8, bot=Math.max(open,close)+4+rnd*8;
      const up=close<open; const col=up?"#22b07d":"#e5484d";
      html+=`<line x1="${x+6}" y1="${top}" x2="${x+6}" y2="${bot}" stroke="${col}" stroke-width="1.4"/>`;
      html+=`<rect x="${x}" y="${Math.min(open,close)}" width="12" height="${Math.max(3,Math.abs(close-open))}" fill="${col}" rx="1.5"/>`;
      prev=close; x+=17;
    }
    svg.innerHTML=html;
  })();

  // ── 테마 토글 ──
  document.getElementById("themeBtn").onclick=()=>{
    const cur=document.documentElement.getAttribute("data-theme");
    const next = cur==="dark"?"light": cur==="light"? "dark" : (matchMedia("(prefers-color-scheme: dark)").matches?"light":"dark");
    document.documentElement.setAttribute("data-theme",next);
  };

  // ── 유틸 ──
  const $=(id)=>document.getElementById(id);
  const money=(n)=> "$"+Number(n||0).toLocaleString("en-US",{maximumFractionDigits:0});
  const pctf=(n)=>{n=Number(n||0);return (n>=0?"+":"")+n.toFixed(2)+"%";};

  // ── 데이터 로드 ──
  const DEMO = {
    run_date:"(데모)", market_light:"green", strategy_version:1,
    hud:{initial_capital:100000,equity:100000,cash:100000,total_return_pct:0,holdings_count:0,wins:0,losses:0,max_drawdown:0},
    holdings:[], recommendations:[],
    timeline: ORDER.flatMap((n,i)=>[
      {agent:n,action:"talk",phase:PHASES[Math.min(i,PHASES.length-1)],msg:{
        Alex:"안녕하세요! 아직 실행 데이터가 없어요. 터미널에서 npm run start-investment 를 돌려보세요 🔍",
        Nova:"커뮤니티 스카우트 Nova! 미국 투자판 버즈를 스캔해서 뜨는 종목을 알려줘요 🛰️",
        Sara:"저는 포지션 사이징 담당 Sara예요. 리스크는 늘 2%로 관리합니다 🛡️",
        Jordan:"트레이더 Jordan! 매매일지에 다 기록해요 🎧",
        Morgan:"전략가 Morgan이에요. 매매일지 보고 전략을 계속 발전시켜요 📖",
        RICH:"CEO RICH다! 실행하면 여기서 우리가 일하는 모습이 펼쳐진다 👑"
      }[n], t:i}
    ])
  };
  const DATA = (window.__NO_DATA || !window.RUN_DATA) ? DEMO : window.RUN_DATA;
  const isDemo = DATA===DEMO;

  // ── HUD 렌더 ──
  function renderHUD(){
    const h=DATA.hud||{};
    $("s-equity").textContent=money(h.equity);
    const rt=$("s-return"); rt.textContent=pctf(h.total_return_pct); rt.className=(h.total_return_pct>=0?"pos":"neg");
    $("s-cash").textContent=money(h.cash);
    $("s-hold").textContent=h.holdings_count||0;
    $("s-wl").textContent=(h.wins||0)+" / "+(h.losses||0);
    $("s-ver").textContent="v"+(DATA.strategy_version||1);
    $("dateLbl").textContent=DATA.run_date||"";
    const L=DATA.market_light||"green";
    const map={green:["#22b07d","🟢 초록불 · 진입가능"],yellow:["#f1b300","🟡 노랑불 · 주의"],red:["#e5484d","🔴 빨강불 · 진입중단"]};
    $("lightdot").style.background=map[L][0]; $("lighttxt").textContent=map[L][1];
    // 추천 목록
    const rc=$("recos");
    if((DATA.recommendations||[]).length){
      rc.innerHTML="<div style='font-size:11px;color:var(--sub);font-weight:800;margin-bottom:6px'>📊 오늘의 추천/진입</div>"+
        DATA.recommendations.map(r=>`<div class="r"><b>${r.symbol}</b> ${r.strategy==="perfect_storm"?"⚡":"👨‍🏫"} · ${money(r.entry)} · ${r.qty}주 · 손절 ${money(r.stop)}<br><span style="color:var(--sub)">${(r.reasons||[])[0]||""}</span></div>`).join("");
    } else if((DATA.holdings||[]).length){
      rc.innerHTML="<div style='font-size:11px;color:var(--sub);font-weight:800;margin-bottom:6px'>💼 현재 보유</div>"+
        DATA.holdings.map(h=>`<div class="r"><b>${h.symbol}</b> ${h.qty}주 · 진입 ${money(h.entry)} · 현재 ${money(h.current)} · <span class="${h.pnl_pct>=0?'pos':'neg'}">${pctf(h.pnl_pct)}</span></div>`).join("");
    } else {
      rc.innerHTML="<div style='font-size:12px;color:var(--sub)'>보유/추천 종목이 여기에 표시됩니다.</div>";
    }
    // 🛰️ 커뮤니티 버즈 (Nova)
    if(DATA.buzz){
      let b="<div style='font-size:11px;color:var(--sub);font-weight:800;margin:10px 0 6px'>🛰️ 커뮤니티 버즈 (Nova)</div>";
      if((DATA.buzz.strong||[]).length){
        b+=DATA.buzz.strong.map(s=>`<div class="r">🔥 <b>${s.symbol}</b>${s.title?" · "+s.title:""}<br><span style="color:var(--sub);font-size:11px">RS상위 ${(100-s.rsRank).toFixed(1)}% · ${s.sector}${s.brk60?" · 돌파✓":""}</span></div>`).join("");
      } else {
        b+="<div style='font-size:11px;color:var(--sub)'>버즈+RS강세 교집합 없음 (관망)</div>";
      }
      if((DATA.buzz.other||[]).length) b+=`<div style='font-size:11px;color:var(--sub);margin-top:4px'>기타 버즈: ${DATA.buzz.other.join(", ")}</div>`;
      b+="<div style='font-size:10.5px;color:var(--sub);margin-top:4px'>⚠️ 버즈는 인기 신호일 뿐 매수 근거 아님</div>";
      rc.innerHTML += b;
    }
  }

  // ── 페이즈 바 ──
  const phasesEl=$("phases");
  PHASES.forEach(p=>{const s=document.createElement("span");s.className="ph";s.textContent=p;s.dataset.p=p;phasesEl.appendChild(s);});
  function setPhase(p){[...phasesEl.children].forEach(c=>c.classList.toggle("on",c.dataset.p===p));}

  // ── 재생 엔진 ──
  const log=$("log");
  let speed=1, timer=null, idx=0;
  const SPEEDS=[1,1.5,2,0.5];
  $("speedBtn").onclick=()=>{const i=(SPEEDS.indexOf(speed)+1)%SPEEDS.length;speed=SPEEDS[i];$("speedBtn").textContent="속도 "+speed+"x";};

  function clearBubbles(){ORDER.forEach(n=>$("bubble-"+n).classList.remove("show"));}
  function setActive(name){
    ORDER.forEach(n=>{const el=nodes[n];el.classList.toggle("active",n===name);el.classList.toggle("dim",n!==name);});
  }
  function addLog(name,msg){
    const c=CHARS[name];
    const d=document.createElement("div");d.className="msg";
    d.innerHTML=`<span class="who" style="background:${c.color}">${c.emoji} ${name}</span><span class="txt">${msg}</span>`;
    log.appendChild(d); log.scrollTop=log.scrollHeight;
  }

  function step(){
    const tl=DATA.timeline||[];
    if(idx>=tl.length){ finish(); return; }
    const ev=tl[idx++];
    if(ev.phase) setPhase(ev.phase);
    setActive(ev.agent);
    clearBubbles();
    const b=$("bubble-"+ev.agent);
    if(b){ b.textContent=ev.msg; b.classList.add("show"); }
    addLog(ev.agent, ev.msg);
    const dur = Math.max(900, Math.min(3200, 1100 + ev.msg.length*38)) / speed;
    timer=setTimeout(step, dur);
  }
  function finish(){
    setPhase("보고");
    setActive("RICH"); clearBubbles();
    const b=$("bubble-RICH"); if(b){b.textContent="오늘 미션 완료! 다음에 또 봐요 👋";b.classList.add("show");}
    ORDER.forEach(n=>nodes[n].classList.remove("dim"));
  }
  function play(){
    clearTimeout(timer); idx=0; log.innerHTML="";
    ORDER.forEach(n=>{nodes[n].classList.remove("active","dim");});
    step();
  }
  $("replayBtn").onclick=play;

  // ── 히스토리 탭 ──
  const HIST = (window.__NO_HISTORY || !window.HISTORY_DATA) ? null : window.HISTORY_DATA;
  const lightEmoji=(l)=>({green:"🟢",yellow:"🟡",red:"🔴"}[l]||"🟢");
  const stratTag=(s)=> s==="perfect_storm"?"⚡돌파":"👨‍🏫눌림목";
  const esc=(s)=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const cls=(n)=> Number(n)>=0?"pos":"neg";

  function renderDaily(){
    const el=$("tab-daily");
    if(!HIST || !HIST.runs || !HIST.runs.length){ el.innerHTML='<div class="empty">아직 일자별 기록이 없습니다.<br>start-investment 를 실행하면 매일 여기 쌓입니다.</div>'; return; }
    const runs=[...HIST.runs].reverse();
    el.innerHTML = runs.map(r=>{
      const buys = (r.opened||[]).map(o=>
        `<div class="trade">🟢 <b>${o.symbol}</b> ${o.qty}주 @ ${money(o.entry)} · 손절 ${money(o.stop)}<br><span class="why">${stratTag(o.strategy)} · ${esc(o.reason)}</span></div>`).join("");
      const sells = (r.events||[]).map(e=>{
        const lab = e.type==="tier1"?"1차 익절":"청산";
        const lesson = e.lesson?`<span class="lesson">🔎 손실 원인: ${esc(e.lesson)}</span>`:"";
        const note = e.note?`<span class="note">✅ ${esc(e.note)}</span>`:"";
        return `<div class="trade">🔴 <b>${e.symbol}</b> ${lab} · <span class="rp ${cls(e.realized)}">${money(e.realized)} (${pctf(e.rpct)})</span>${lesson}${note}</div>`;
      }).join("");
      const body = (buys||sells) ? (
        (buys?`<div class="day-sec">매수</div>${buys}`:"")+(sells?`<div class="day-sec">매도/청산</div>${sells}`:"")
      ) : `<div class="why" style="padding:4px 2px">관망 (신규 거래 없음)</div>`;
      return `<div class="day"><div class="day-h"><span>📅 ${r.date} · ${lightEmoji(r.market_light)} · v${r.strategy_version}</span><span class="ret ${cls(r.return_pct)}">누적 ${pctf(r.return_pct)}</span></div>${body}</div>`;
    }).join("");
  }

  function renderCurve(){
    const el=$("tab-curve");
    const eh = HIST && HIST.equity_history ? HIST.equity_history : [];
    if(!eh.length){ el.innerHTML='<div class="empty">수익률 추이 데이터가 아직 없습니다.</div>'; return; }
    const cap = (HIST&&HIST.initial_capital)||100000;
    const vals=eh.map(p=>p.equity);
    const min=Math.min(cap,...vals), max=Math.max(cap,...vals);
    const pad=(max-min)*0.12||1000; const lo=min-pad, hi=max+pad;
    const W=300,H=150, n=eh.length;
    const x=i=> n<=1? W/2 : 12+(i*(W-24)/(n-1));
    const y=v=> H-10-((v-lo)/(hi-lo))*(H-30);
    const pts=eh.map((p,i)=>`${x(i).toFixed(1)},${y(p.equity).toFixed(1)}`).join(" ");
    const baseY=y(cap).toFixed(1);
    const last=eh[eh.length-1];
    const dots=eh.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.equity).toFixed(1)}" r="3" fill="${p.return_pct>=0?'#22b07d':'#e5484d'}"><title>${p.date}: ${pctf(p.return_pct)}</title></circle>`).join("");
    el.innerHTML=`
      <div style="padding:14px 12px">
        <div style="font-weight:800;font-size:13px;margin-bottom:2px">📈 누적 수익률 추이</div>
        <div style="font-size:12px;color:var(--sub);margin-bottom:10px">최근 ${n}회 · 현재 <b class="${cls(last.return_pct)}">${pctf(last.return_pct)}</b> · 총자산 ${money(last.equity)}</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:var(--card);border-radius:12px;box-shadow:var(--shadow)">
          <line x1="8" y1="${baseY}" x2="${W-8}" y2="${baseY}" stroke="var(--line)" stroke-width="1" stroke-dasharray="4 4"/>
          <text x="10" y="${(baseY-4)}" font-size="8" fill="var(--sub)">시작 ${money(cap)}</text>
          ${n>1?`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>`:""}
          ${dots}
        </svg>
        <div style="font-size:11px;color:var(--sub);margin-top:8px">🎯 목표: 매월 +20~30% · 점을 올리면 날짜별 수익률이 보입니다.</div>
      </div>`;
  }

  function renderReco(){
    const el=$("tab-reco");
    if(!HIST || !HIST.runs || !HIST.runs.length){ el.innerHTML='<div class="empty">추천·기업분석 기록이 아직 없습니다.</div>'; return; }
    const runs=[...HIST.runs].reverse();
    el.innerHTML = runs.map(r=>{
      if(!(r.recommendations||[]).length) return "";
      const items=r.recommendations.map(rec=>{
        const clean=esc(rec.analysis).replace(/^#{1,6}\s*/gm,"").replace(/\*\*/g,"");
        return `<details><summary><b>${rec.symbol}</b> ${stratTag(rec.strategy)} · RS상위 ${rec.top_pct}% · ${money(rec.price)}<br><span style="color:var(--sub);font-weight:600;font-size:11px">${esc(rec.reason)}</span></summary><pre>${clean}</pre></details>`;
      }).join("");
      return `<div class="daydivider">📅 ${r.date} · 추천 ${r.recommendations.length}종목</div>${items}`;
    }).join("") || '<div class="empty">추천 종목이 없습니다.</div>';
  }

  // 탭 전환
  const rendered={};
  document.querySelectorAll(".tab").forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.dataset.tab;
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on",b===btn));
      ["log","daily","curve","reco"].forEach(k=>{ $("tab-"+k).hidden = (k!==t); });
      if(!rendered[t]){ if(t==="daily")renderDaily(); if(t==="curve")renderCurve(); if(t==="reco")renderReco(); rendered[t]=true; }
    };
  });

  // ── 시작 ──
  renderHUD();
  if(isDemo){ $("banner").textContent="ℹ️ 데모 모드 — 실제 실행 데이터가 없습니다. 터미널에서 'npm run start-investment' 실행 후 새로고침하세요."; }
  else if(DATA.source==='simulation'){ $("banner").textContent="🎬 데모 시뮬레이션 데이터입니다 — 실제 매매는 'npm run start-investment' 로 시작하세요. (교육용 모의투자)"; }
  play();
})();
</script>
</body>
</html>
